; Discord RAM Fix — runtime settings (read by version.dll next to Discord.exe)
; Restart Discord after editing.

[Settings]

; Periodic working-set trim (1 = on, 0 = off)
EnableTrim=1
TrimIntervalMs=10000

; Process priority enforcement (1 = on, 0 = off)
EnablePriorityFix=1
; PriorityClass: 0=Idle, 1=BelowNormal, 2=Normal, 3=AboveNormal, 4=High
PriorityClass=2

; Thread priority enforcement (1 = on, 0 = off)
EnableThreadPriorityFix=1

; Raw input handling: 0=Off, 1=Suspend thread, 2=Zeroing, 3=Zeroing+Throttle
RawInputMode=1
RawInputSleepMs=1500
RawInputPatchDelayMs=10000
